server:
  port: 8080

spring:
  # 启用哪一个环境配置, dev为开发环境 test为测试环境  prod为生产环境   uat为用户验收环境
  profiles:
    active: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/sparrow_rental?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${sparrow.datasource.username}
    password: ${sparrow.datasource.password}
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 # 数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 12 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: SPHHikariPool # 连接池名称
  servlet:
    multipart:
      # 单个文件最大上传大小（建议设为比你需要的文件稍大，比如50MB）
      max-file-size: 50MB
      # 单次请求（可以多文件上传）的总大小上限（建议比单个文件大，比如100MB）
      max-request-size: 100MB
  # Jackson 时间格式
  Jackson:
    # 时区
    time-zone:  GMT+8

  data:
    redis:
      host: ${sparrow.redis.host}
      port: ${sparrow.redis.port}
      database: 0


# 用于打印框架生成的sql语句，便于调试
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 禁用Spring Boot Admin MBean以避免冲突
management:
  endpoints:
    jmx:
      exposure:
        include: ""
  endpoint:
    shutdown:
      enabled: false


# MinIO 对象存储配置
minio:
  # MinIO 服务的 API 访问地址（格式：http://IP:端口，默认端口9000）
  # 示例：本地部署填 http://127.0.0.1:9000；服务器部署填 http://192.168.10.101:9000
  endpoint: http://127.0.0.1:9000
  # MinIO 账号（对应启动时设置的 MINIO_ROOT_USER，默认是 minioadmin）
  access-key: ${sparrow.minio.access-key}
  # MinIO 密码（对应启动时设置的 MINIO_ROOT_PASSWORD，默认是 minioadmin，正式环境建议修改）
  secret-key: ${sparrow.minio.secret-key}
  # 默认使用的存储桶名称（需提前在 MinIO 控制台创建好）
  bucket-name: ${sparrow.minio.bucket-name}
  # 可选配置：是否启用 SSL（HTTPS 访问，默认 false，本地测试一般用 HTTP）
  secure: false
  # 可选配置：是否启用路径样式访问（旧版 MinIO 需开启，新版默认是虚拟主机模式，一般保持 false 即可）
  path-style-access: false



# Swagger 配置（springdoc-openapi，对应 OpenAPI 3.0）
springdoc:
  # 开启复杂参数对象扁平化展示：将 DTO/VO 的字段直接展平为独立请求参数，不展示嵌套对象结构
  # 适用场景：GET 查询参数、POST 表单参数（@RequestParam），让 Swagger 文档参数展示更简洁
  # 注意：对于 @RequestBody 接收的 JSON 格式参数，建议保持默认 false（不扁平化），更符合 JSON 嵌套结构展示
  default-flat-param-object: true